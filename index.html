<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MadCourts - Mapa de Canchas</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #map { height: 100vh; width: 100%; }
        
        /* Panel de Información Lateral */
        .info-panel { 
            position: absolute; top: 15px; left: 50px; z-index: 1000; 
            background: white; padding: 15px; border-radius: 10px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); width: 220px;
        }
        .stat-num { font-weight: bold; color: #e65c00; font-size: 1.2em; }
        
        /* --- ESTILOS MODERNOS PARA POPUPS --- */
        .leaflet-popup-content-wrapper {
            padding: 0 !important;
            overflow: hidden;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }
        
        .leaflet-popup-content {
            margin: 0 !important;
            width: 250px !important;
        }

        .leaflet-popup-close-button {
            color: white !important;
            padding: 10px 10px 0 0 !important;
        }

        /* Cabeceras según tipo */
        .popup-header {
            color: white;
            padding: 15px 12px;
            font-weight: bold;
            font-size: 1.1em;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .popup-header.polis { background: #d32f2f; } /* Rojo para polideportivos */
        .popup-header.calle { background: #1976d2; } /* Azul para calle */
        
        .popup-body {
            padding: 15px;
            color: #333;
        }
        
        .popup-info {
            font-size: 0.9em;
            margin-bottom: 8px;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        
        .popup-label {
            font-size: 0.7em;
            text-transform: uppercase;
            color: #888;
            font-weight: bold;
            letter-spacing: 0.5px;
        }
        
        .btn-routing {
            display: block;
            text-align: center;
            background: #333;
            color: white !important;
            text-decoration: none;
            padding: 10px;
            border-radius: 6px;
            margin-top: 12px;
            font-size: 0.85em;
            font-weight: bold;
            transition: background 0.3s;
        }
        
        .btn-routing:hover {
            background: #e65c00;
        }

        /* Personalización del Selector de Capas */
        .leaflet-control-layers {
            border: none !important; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.2) !important;
            border-radius: 10px !important;
            padding: 10px !important;
        }
        
        .leaflet-control-layers-selector {
            accent-color: #e65c00; 
            transform: scale(1.1);
            margin-right: 8px !important;
        }
    </style>
</head>
<body>

    <div class="info-panel">
        <h2 style="margin:0; color: #e65c00;">🏀 MadCourts</h2>
        <p>Canchas encontradas: <span class="stat-num" id="total-mapa">0</span></p>
        <div style="font-size: 0.85em; line-height: 1.6;">
            <span style="color: #1976d2;">●</span> Canchas Calle <br>
            <span style="color: #d32f2f;">●</span> Polideportivos
        </div>
        <hr style="border: 0; border-top: 1px solid #eee; margin: 10px 0;">
        <p style="font-size: 0.75em; color: #666;">Datos actualizados de Madrid Abierto.</p>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

    <script>
        // 1. Inicializar el mapa
        var map = L.map('map', { 
            minZoom: 10,
            maxZoom: 19,
            closePopupOnClick: true
        }).setView([40.4167, -3.7037], 12);
        
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; CARTO'
        }).addTo(map);

        var capaCanchas = L.layerGroup().addTo(map);
        var capaPolis = L.layerGroup().addTo(map);

        let totalPintados = 0;

        // 2. Función de limpieza de coordenadas (Madrid específico)
        function superLimpieza(txt, tipo) {
            if (!txt) return null;
            let soloNumeros = String(txt).replace(/[^-0-9]/g, '');
            if (tipo === 'lat') {
                if (soloNumeros.startsWith('40')) return parseFloat('40.' + soloNumeros.substring(2));
                if (soloNumeros.startsWith('4')) return parseFloat('40.' + soloNumeros.substring(1));
            } else {
                let puro = soloNumeros.replace('-', '');
                if (puro.startsWith('3')) return -parseFloat('3.' + puro.substring(1));
            }
            return null;
        }

        // 3. Función principal de carga
        function cargarCanchas(archivo, color) {
            Papa.parse(archivo, {
                download: true,
                header: true,
                skipEmptyLines: true,
                delimiter: ";",
                complete: function(results) {
                    results.data.forEach(function(pista) {
                        let lat = superLimpieza(pista.LATITUD || pista.latitud, 'lat');
                        let lon = superLimpieza(pista.LONGITUD || pista.longitud, 'lon');

                        if (lat && lon && lat > 39.8 && lat < 41.2 && lon > -4.5 && lon < -3.0) {
                            
                            let markerStyle = {
                                radius: color === 'red' ? 8 : 6,
                                fillColor: color === 'red' ? '#d32f2f' : '#1976d2',
                                color: "#fff",
                                weight: 2,
                                opacity: 1,
                                fillOpacity: 0.8
                            };
                            
                            let nombreLugar = (color === "red") 
                                ? (pista.NOMBRE || "Polideportivo Municipal")
                                : ((pista['CLASE-VIAL'] || "") + " " + (pista['NOMBRE-VIA'] || "Cancha Pública")).trim();
                            
                            let tipoClase = (color === 'red') ? 'polis' : 'calle';
                            let icono = (color === 'red') ? '🏟️' : '🏀';
                            let tituloTipo = (color === 'red') ? 'Polideportivo' : 'Cancha Calle';
                            
                            // URL dinámica para Google Maps corregida
                            const gmapsUrl = `https://www.google.com/maps/dir/?api=1&destination=${lat},${lon}`;
                            
                            L.circleMarker([lat, lon], markerStyle)
                                .addTo(color === 'red' ? capaPolis : capaCanchas)
                                .bindPopup(`
                                    <div class="popup-header ${tipoClase}">
                                        ${icono} ${tituloTipo}
                                    </div>
                                    <div class="popup-body">
                                        <div style="margin-bottom: 10px;">
                                            <b style="font-size: 1.1em; line-height: 1.2; display: block;">${nombreLugar}</b>
                                        </div>
                                        <div class="popup-info">
                                            <span class="popup-label">Distrito</span>
                                            <span>📍 ${pista.DISTRITO || "Madrid"}</span>
                                        </div>
                                        <div class="popup-info">
                                            <span class="popup-label">Barrio</span>
                                            <span>🏘️ ${pista.BARRIO || "N/A"}</span>
                                        </div>
                                        <a href="${gmapsUrl}" target="_blank" class="btn-routing">
                                            🚗 CÓMO LLEGAR
                                        </a>
                                    </div>
                                `);
