<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MadCourts - Naranja & Beige Edition</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        /* --- PALETA DE COLORES ---
           Naranja Principal: #e65c00
           Beige Fondo Web:   #faf7f2
           Beige Panel/Card:  #fffdfa
           Beige Tostado (Bordes): #e0d7c6
           Texto Principal:   #4a4439
        --------------------------- */

        body, html { 
            margin: 0; padding: 0; height: 100%; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #faf7f2;
            color: #4a4439;
        }
        
        #map { height: 100%; width: 100%; }

        /* --- NUEVO TÍTULO MINIMALISTA --- */
        .brand-header {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(255, 253, 250, 0.9);
            backdrop-filter: blur(10px);
            padding: 10px 25px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.2em;
            color: #e65c00;
            box-shadow: 0 4px 15px rgba(74, 68, 57, 0.1);
            border: 1px solid #e0d7c6;
            letter-spacing: 1px;
            pointer-events: none;
        }

        /* --- NAVEGACIÓN PRINCIPAL --- */
        .main-nav {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2000;
            background: rgba(255, 253, 250, 0.9);
            backdrop-filter: blur(10px);
            padding: 10px;
            border-radius: 50px;
            display: flex;
            gap: 15px;
            box-shadow: 0 5px 20px rgba(74, 68, 57, 0.15);
            border: 1px solid #e0d7c6;
        }

        .nav-btn {
            padding: 12px 28px;
            border: none;
            background: transparent;
            color: #4a4439;
            font-weight: bold;
            font-size: 1em;
            cursor: pointer;
            border-radius: 30px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-btn.active {
            background-color: #e65c00;
            color: white;
            box-shadow: 0 4px 10px rgba(230, 92, 0, 0.3);
        }

        .content-section {
            display: none;
            height: 100vh;
            width: 100%;
            position: absolute;
            top: 0; left: 0;
        }

        .content-section.active { display: block; }

        /* --- PERFIL --- */
        .profile-container {
            background-color: #faf7f2;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .profile-card {
            background: #fffdfa;
            padding: 40px;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(74, 68, 57, 0.1);
            text-align: center;
            width: 350px;
            border: 1px solid #e0d7c6;
        }

        .avatar {
            font-size: 60px;
            background: #e0d7c6;
            width: 100px; height: 100px;
            line-height: 100px;
            border-radius: 50%;
            margin: 0 auto 20px;
        }

        .profile-stats {
            display: flex;
            justify-content: space-around;
            margin: 25px 0;
            background: #faf7f2;
            padding: 15px;
            border-radius: 15px;
        }

        .btn-edit {
            background-color: #e65c00;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
        }

        /* --- POPUPS --- */
        .leaflet-popup-content-wrapper {
            padding: 0 !important;
            overflow: hidden;
            border-radius: 12px;
            background: #fffdfa !important;
            border: 1px solid #e0d7c6;
        }
        
        .leaflet-popup-content { margin: 0 !important; width: 250px !important; }
        .popup-header { padding: 15px 12px; font-weight: bold; border-bottom: 1px solid #e0d7c6; }
        .popup-header.polis { background: #faf7f2; color: #8c7f6b; }
        .popup-header.calle { background: #fff3e6; color: #e65c00; }
        .popup-body { padding: 15px; }
        .btn-routing {
            display: block; text-align: center; background: #4a4439; color: white !important;
            text-decoration: none; padding: 10px; border-radius: 8px; margin-top: 12px; font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="main-nav">
        <button class="nav-btn active" onclick="showSection('map-section', event)">
            📍 <span>Mapa</span>
        </button>
        <button class="nav-btn" onclick="showSection('profile-section', event)">
            👤 <span>Perfil</span>
        </button>
    </div>

    <div id="map-section" class="content-section active">
        <div class="brand-header">🏀 MadCourts</div>
        <div id="map"></div>
    </div>

    <div id="profile-section" class="content-section">
        <div class="profile-container">
            <div class="profile-card">
                <div class="avatar">🏀</div>
                <h2>Jugador MadCourts</h2>
                <p style="color: #8c7f6b; margin: 0;">Miembro desde 2024</p>
                <div class="profile-stats">
                    <div><strong>12</strong><br>Partidos</div>
                    <div><strong>3</strong><br>Favoritas</div>
                </div>
                <button class="btn-edit">Editar Perfil</button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

    <script>
    function showSection(sectionId, event) {
        document.querySelectorAll('.content-section').forEach(section => section.classList.remove('active'));
        document.getElementById(sectionId).classList.add('active');
        document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
        event.currentTarget.classList.add('active');
        if (sectionId === 'map-section') {
            setTimeout(() => { map.invalidateSize(); }, 100);
        }
    }

    var map = L.map('map', { 
        minZoom: 10, maxZoom: 19, closePopupOnClick: true, zoomControl: false 
    }).setView([40.4167, -3.7037], 12);
    
    L.control.zoom({ position: 'topleft' }).addTo(map);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
        attribution: '© CARTO'
    }).addTo(map);

    var capaCanchas = L.layerGroup().addTo(map);
    var capaPolis = L.layerGroup().addTo(map);
    let totalPintados = 0;

    function superLimpieza(txt, tipo) {
        if (!txt) return null;
        let soloNumeros = String(txt).replace(/[^-0-9]/g, '');
        if (tipo === 'lat') {
            if (soloNumeros.startsWith('40')) return parseFloat('40.' + soloNumeros.substring(2));
            if (soloNumeros.startsWith('4')) return parseFloat('40.' + soloNumeros.substring(1));
        } else {
            let puro = soloNumeros.replace('-', '');
            if (puro.startsWith('3')) return -parseFloat('3.' + puro.substring(1));
        }
        return null;
    }

    function cargarCanchas(archivo, tipoCancha) {
        Papa.parse(archivo, {
            download: true, header: true, skipEmptyLines: true, delimiter: ";",
            complete: function(results) {
                results.data.forEach(function(pista) {
                    let lat = superLimpieza(pista.LATITUD || pista.latitud, 'lat');
                    let lon = superLimpieza(pista.LONGITUD || pista.longitud, 'lon');

                    if (lat && lon && lat > 39.0 && lat < 41.5 && lon > -4.5 && lon < -3.0) {
                        let markerStyle = {
                            radius: tipoCancha === 'polis' ? 8 : 6,
                            fillColor: tipoCancha === 'polis' ? '#8c7f6b' : '#e65c00', 
                            color: "#fffdfa", weight: 2, opacity: 1, fillOpacity: 0.9
                        };
                        let nombreLugar = (tipoCancha === "polis") 
                            ? (pista.NOMBRE || "Polideportivo Municipal")
                            : ((pista['CLASE-VIAL'] || "") + " " + (pista['NOMBRE-VIA'] || "Cancha Pública")).trim();
                        
                        const gmapsUrl = `https://www.google.com/maps/search/?api=1&query=${lat},${lon}`;
                        
                        L.circleMarker([lat, lon], markerStyle)
                            .addTo(tipoCancha === 'polis' ? capaPolis : capaCanchas)
                            .bindPopup(`
                                <div class="popup-header ${tipoCancha}">
                                    ${tipoCancha === 'polis' ? '🏟️' : '🏀'} ${tipoCancha === 'polis' ? 'Polideportivo' : 'Cancha Calle'}
                                </div>
                                <div class="popup-body">
                                    <b style="display:block; margin-bottom:10px;">${nombreLugar}</b>
                                    <div style="font-size:0.9em; color:#666;">
                                        📍 ${pista.DISTRITO || "Madrid"}<br>
                                        🏘️ ${pista.BARRIO || "N/A"}
                                    </div>
                                    <a href="${gmapsUrl}" target="_blank" class="btn-routing">🚗 CÓMO LLEGAR</a>
                                </div>
                            `);
                        totalPintados++;
                    }
                });
            }
        });
    }

    cargarCanchas("canchas_basket_madrid.csv", "calle");
    cargarCanchas("polideportivos_aptos_saneado.csv", "polis");
    </script>
</body>
</html>
