<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MadCourts - Naranja & Beige Edition</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="css/styles.css">
    
    
</head>
<body>

    <div class="main-nav">
        <button class="nav-btn active" onclick="showSection('map-section', event)">
            📍 <span>Mapa</span>
        </button>
        <button class="nav-btn" onclick="showSection('profile-section', event)">
            👤 <span>Perfil</span>
        </button>
    </div>

    <div id="map-section" class="content-section active">
        <div class="brand-header">🏀 MadCourts</div>
        <button class="ubi-btn" onclick="buscarUbicacionUser()">
            🎯 <span> Mi Ubicación </span>
        </button>
        <div id="map"></div>
    </div>

    <div id="profile-section" class="content-section">
        <div class="profile-container">
            <div class="profile-card">
                <div class="avatar">🏀</div>
                <h2>Jugador MadCourts</h2>
                <p style="color: #8c7f6b; margin: 0;">Miembro desde 2024</p>
                <div class="profile-stats">
                    <div><strong>12</strong><br>Partidos</div>
                    <div><strong>3</strong><br>Favoritas</div>
                </div>
                <button class="btn-edit">Editar Perfil</button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

    <script src="js/utils.js"></script>
    <script src="js/map.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
