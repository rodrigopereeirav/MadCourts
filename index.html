<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MadCourts - Posición Real</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', sans-serif; }
        #map { height: 100vh; width: 100%; }
        .info-panel { 
            position: absolute; top: 15px; left: 50px; z-index: 1000; 
            background: white; padding: 15px; border-radius: 10px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); width: 220px;
        }
        .stat-num { font-weight: bold; color: #e65c00; font-size: 1.2em; }
    </style>
</head>
<body>

    <div class="info-panel">
        <h2 style="margin:0; color: #e65c00;">🏀 MadCourts</h2>
        <p>Canchas en Madrid: <span class="stat-num" id="total-mapa">0</span></p>
        <p style="font-size: 0.75em; color: #666;">Ubicación exacta (sin jitter).</p>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

    <script>
        var map = L.map('map').setView([40.4167, -3.7037], 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        function superLimpieza(txt, tipo) {
            if (!txt) return null;
            let soloNumeros = String(txt).replace(/[^-0-9]/g, '');
            
            if (tipo === 'lat') {
                if (soloNumeros.startsWith('40')) return parseFloat('40.' + soloNumeros.substring(2));
                if (soloNumeros.startsWith('4')) return parseFloat('40.' + soloNumeros.substring(1));
            } else {
                let esNegativo = soloNumeros.includes('-');
                let puro = soloNumeros.replace('-', '');
                if (puro.startsWith('3')) {
                    let res = parseFloat('3.' + puro.substring(1));
                    return -res; 
                }
            }
            return null;
        }

        Papa.parse("canchas_basket_madrid.csv", {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                let pintados = 0;

                results.data.forEach(function(pista) {
                    let lat = superLimpieza(pista.LATITUD || pista.latitud, 'lat');
                    let lon = superLimpieza(pista.LONGITUD || pista.longitud, 'lon');

                    // Dibujamos solo si está en el rango de Madrid
                    if (lat > 39.8 && lat < 41.2 && lon > -4.5 && lon < -3.0) {
                        // USAMOS LAS COORDENADAS DIRECTAS (sin jitter)
                        L.marker([lat, lon]).addTo(map)
                         .bindPopup(`<b>${pista.EQUIPAMIENTO || "Cancha"}</b><br>${pista.BARRIO || ""}`);
                        pintados++;
                    }
                });
                document.getElementById('total-map
