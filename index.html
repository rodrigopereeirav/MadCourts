<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MadCourts - Naranja & Beige Edition</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="css/styles.css">
    
    
</head>
<body>

    <div class="main-nav">
        <button class="nav-btn active" onclick="showSection('map-section', event)">
            📍 <span>Mapa</span>
        </button>
        <button class="nav-btn" onclick="showSection('profile-section', event)">
            👤 <span>Perfil</span>
        </button>
    </div>

    <div id="map-section" class="content-section active">
        <div class="brand-header">🏀 MadCourts</div>
        <button class="ubi-btn" onclick="buscarUbicacionUser()">
            🎯 <span class="btn-text"> Mi Ubicación </span>
        </button>
        <div id="map"></div>
    </div>

    <div id="profile-section" class="content-section">
    <div class="profile-container">
        <div class="profile-card">
            <div class="avatar">🏀</div>
            <h2 id="user-display-name">Jugador MadCourts</h2>
            <p id="user-handle" style="color: #8c7f6b; margin: 0;">@usuario</p>
            
            <p id="user-bio" class="profile-bio">"Aquí tu biografía... ¡Cuéntanos cómo juegas!"</p>

            <div class="user-location">
            <span id="val-distrito">Distrito</span> • <span id="val-barrio">Barrio</span>
            </div>

            <div class="profile-stats">
                <div><strong>12</strong><br>Partidos</div>
                <div><strong id="cont-favoritos">0</strong><br>Favoritas</div>
            </div>

            <div class="profile-info-grid">
                <div class="info-item">
                    <span>Altura</span>
                    <strong id="val-altura">-- cm</strong>
                </div>
                <div class="info-item">
                    <span>Peso</span>
                    <strong id="val-peso">-- kg</strong>
                </div>
                <div class="info-item">
                    <span>Posición</span>
                    <strong id="val-posicion">Alero</strong>
                </div>
                <div class="info-item">
                    <span>Nivel</span>
                    <strong id="val-nivel">Amateur</strong>
                </div>
            </div>

            <button class="btn-edit" onclick="abrirEditor()">Editar Perfil</button>
        </div>
    </div>
</div>

    <div id="modal-editor" class="modal">
    <div class="modal-content">
        <h3>Editar mi Ficha</h3>
        <input type="text" id="input-name" placeholder="Nombre completo">
        <input type="text" id="input-username" placeholder="@usuario">
        <textarea id="input-bio" placeholder="Tu biografía..."></textarea>

        <div class="input-group">
            <input type="text" id="input-distrito" placeholder="Distrito">
            <input type="text" id="input-barrio" placeholder="Barrio">
        </div>
        
        <div class="input-group">
            <input type="number" id="input-altura" placeholder="Altura (cm)">
            <input type="number" id="input-peso" placeholder="Peso (kg)">
        </div>

        <select id="input-posicion">
            <option value="Base">Base</option>
            <option value="Escolta">Escolta</option>
            <option value="Alero">Alero</option>
            <option value="Ala-Pívot">Ala-Pívot</option>
            <option value="Pívot">Pívot</option>
        </select>

        <select id="input-nivel">
            <option value="Principiante">Principiante</option>
            <option value="Amateur">Amateur</option>
            <option value="Pro">Pro</option>
        </select>

        <div class="modal-buttons">
            <button onclick="cerrarEditor()" class="btn-cancelar">Cancelar</button>
            <button onclick="guardarPerfil()" class="btn-guardar">Guardar Cambios</button>
        </div>
    </div>
</div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

    <script src="js/utils.js"></script>
    <script src="js/map.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
