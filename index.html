<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MadCourts - Basket Madrid</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', sans-serif; }
        #map { height: 100vh; width: 100%; }
        .info-panel { 
            position: absolute; top: 15px; left: 50px; z-index: 1000; 
            background: white; padding: 15px; border-radius: 10px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); max-width: 250px;
        }
    </style>
</head>
<body>

    <div class="info-panel">
        <h2 style="margin:0; color: #e65c00;">🏀 MadCourts</h2>
        <p style="margin: 5px 0;">Canchas en sistema: <b id="total-csv">Cargando...</b></p>
        <p style="font-size: 0.8em; color: #666;">Marcadores: <b id="total-mapa" style="color: green;">0</b></p>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

    <script>
        // 1. Inicialización del mapa
        var map = L.map('map').setView([40.4167, -3.7037], 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        // 2. Función para limpiar coordenadas
        function limpiar(txt) {
            if (!txt) return null;
            let limpio = String(txt).replace(/[^-0-9.]/g, '');
            let partes = limpio.split('.');
            if (partes.length > 2) {
                limpio = partes[0] + "." + partes.slice(1).join('');
            }
            let num = parseFloat(limpio);
            return isNaN(num) ? null : num;
        }

        // 3. Cargar el archivo CSV
        // IMPORTANTE: Asegúrate de que el archivo en GitHub se llame exactamente así
        Papa.parse("canchas_basket_madrid.csv", {
            download: true,
            header: true,
            skipEmptyLines: true,
            error: function(err) {
                document.getElementById('total-csv').innerText = "Error de archivo";
                console.error(err);
            },
            complete: function(results) {
                console.log("Datos recibidos:", results.data.length);
                document.getElementById('total-csv').innerText = results.data.length;

                let pintados = 0;
                results.data.forEach(function(pista) {
                    let lat = limpiar(pista.LATITUD || pista.latitud);
                    let lon = limpiar(pista.LONGITUD || pista.longitud);

                    if (lat && lon && lat !== 0) {
                        L.marker([lat, lon]).addTo(map)
                         .bindPopup("<b>" + (pista.EQUIPAMIENTO || "Cancha") + "</b>");
                        pintados++;
                    }
                });
                document.getElementById('total-mapa').innerText = pintados;
            }
        }); // Aquí es donde solía faltar el cierre
    </script>
</body>
</html>
